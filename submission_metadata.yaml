ai_usage_summary: |
  AI tools were used for development assistance (architecture discussion, code generation, and
  review) — the engineering, design decisions, calibration, and iteration are the team's own work.
  Separately, a free multi-provider LLM-judge stack (Cerebras gpt-oss-120b as the workhorse, plus
  Groq-hosted open models and Gemini 2.5) produced relevance-tier labels (0-4) for ~1,430
  stratified candidates offline, using the job description as the exact scoring rubric; a LightGBM
  LambdaMART ranker is distilled from those labels. NO hosted LLM is called during ranking:
  rank.py is CPU-only and network-off; it loads precomputed embeddings, a feature store, and the
  distilled ranker. Reasoning strings are template-based and fact-grounded (no generative model at
  rank time), so hallucination is impossible by construction.

methodology_summary: |
  Hybrid retrieval + interpretable rubric + LLM-judge-distilled learned ranker, with
  JD-endorsed behavioral/consistency modifiers. The decisive signal is role/function from
  job TITLES + career history (not the skills list), which demotes keyword-stuffers and
  off-target profiles. A LightGBM LambdaMART model is distilled from LLM-judge tier labels
  (the JD used as the exact rubric) and blended with a transparent weighted rubric;
  multiplicative gates floor honeypots (impossible timelines) and pure off-target functions,
  and an availability multiplier down-weights inactive/unresponsive candidates. Sentinel -1
  signals are treated as neutral (no history), never as low. 59 vectorized features; the
  ranking step runs in ~40s on CPU for 100k candidates with no network.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
